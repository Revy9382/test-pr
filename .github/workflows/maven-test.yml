# 工作流名称，会显示在 GitHub PR 的 Checks 标签中
name: Maven Test on PR

# 触发条件配置
on:
  # 监听 Pull Request 事件
  pull_request:
    # 只有当 PR 的目标分支是 main 或 master 时才触发
    branches: [ main ]

# 定义要执行的任务
jobs:
  # 任务 ID，可以自定义
  test:
    # 任务的显示名称，在 GitHub UI 中展示
    name: Run Tests
    # 指定运行环境，使用最新的 Ubuntu 系统
    runs-on: ubuntu-latest

    # 执行步骤列表
    steps:
    # 步骤1：检出代码
    # 使用 GitHub 官方的 checkout action 将仓库代码下载到运行环境
    - name: Checkout code
      uses: actions/checkout@v4

    # 步骤2：设置 Java 环境
    # 使用 setup-java action 安装 JDK
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        # 指定 Java 版本为 17
        java-version: '17'
        # 使用 Eclipse Temurin 发行版（原 AdoptOpenJDK，开源免费）
        distribution: 'temurin'
        # 启用 Maven 依赖缓存，加速后续构建
        cache: maven

    # 步骤3：运行 Maven 测试并生成 JaCoCo 覆盖率报告
    # clean：清理之前编译的文件
    # verify：执行测试并完成报告生成
    - name: Run Maven Verify
      run: mvn clean verify

    # 步骤4：将 JaCoCo 根目录入口改为带 PR 编号的 HTML 文件
    - name: Create PR-specific JaCoCo Report Entry
      if: always() && github.event_name == 'pull_request'
      run: mv target/site/jacoco/index.html target/site/jacoco/PR${{ github.event.pull_request.number }}.html

    # 步骤5：上传测试结果
    # if: always() 表示无论前面步骤成功或失败，都执行此步骤
    # 这样即使测试失败，也能查看测试报告
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        # 产物的名称，可在 Actions 页面下载
        name: test-results
        # Maven 测试报告的默认输出路径
        path: target/surefire-reports/

    # 步骤6：上传 JaCoCo HTML 报告目录，便于在 Actions 中下载查看
    - name: Upload JaCoCo Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: jacoco-report
        path: target/site/jacoco/
